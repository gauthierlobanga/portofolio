<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 300" width="1100" height="300">
    <defs>
        <linearGradient id="emeraldGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#34D399" />
            <stop offset="100%" stop-color="#059669" />
        </linearGradient>
        <linearGradient id="emeraldGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#10B981" />
            <stop offset="100%" stop-color="#0F766E" />
        </linearGradient>

        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#047857" flood-opacity="0.2" />
        </filter>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#34D399" flood-opacity="0.6" />
        </filter>
    </defs>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;display=swap');

        .text-gau { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 130px; font-weight: 800; fill: #0F172A; letter-spacing: -3px; }
        .text-dev { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 130px; font-weight: 800; fill: url(#emeraldGrad1); letter-spacing: -3px; }
        .subtitle { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 28px; font-weight: 700; fill: #64748B; letter-spacing: 6px; }
        .hex-bg { fill: rgba(52, 211, 153, 0.1); }

        .dark .text-gau { fill: #F1F5F9; }
        .dark .subtitle { fill: #94A3B8; }
        .dark .hex-bg { fill: rgba(52, 211, 153, 0.2); }
    </style>

    <g transform="translate(40, 50)" filter="url(#shadow)">
        <path class="hex-bg" d="M 100 15 L 175 55 L 175 145 L 100 185 L 25 145 L 25 55 Z" />
        <path d="M 85 50 L 35 100 L 85 150" fill="none" stroke="url(#emeraldGrad2)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M 115 50 L 165 100 L 115 150" fill="none" stroke="url(#emeraldGrad1)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="100" cy="100" r="14" fill="#34D399" filter="url(#glow)" />
    </g>

    <text x="250" y="180">
        <tspan class="text-gau">Gau</tspan><tspan class="text-dev">thier</tspan>
    </text>

    <text x="260" y="240" class="subtitle">Creator Digital Solutions</text>
</svg>
